apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vllm-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vllm-server.selectorLabels" . | nindent 8 }}
      annotations:
        # Prometheus scraping is configured via ServiceMonitor, but this lets
        # pod-level scraping work as a fallback.
        prometheus.io/scrape: "true"
        prometheus.io/path: "{{ .Values.metrics.path }}"
        prometheus.io/port: "{{ .Values.metrics.port }}"
    spec:
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--model"
            - "{{ .Values.model.name }}"
            {{- range .Values.vllm.args }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- if .Values.model.hfToken }}
            - name: HUGGING_FACE_HUB_TOKEN
              value: {{ .Values.model.hfToken | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: "1"
              {{- end }}
          # vLLM takes time to load the model — readiness probe prevents traffic
          # before the model is fully loaded into memory.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
